<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="lame.min.js"></script>



    <title>Pemotong Audio</title>
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #10b981;
            --accent: #f43f5e;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .app-container {
            background: var(--card);
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 1.5rem; color: #818cf8; }

        .drop-zone {
            border: 2px dashed #475569;
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 1.5rem;
        }

        .drop-zone:hover { border-color: var(--primary); background: #334155; }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .input-group label { display: block; font-size: 0.75rem; color: #94a3b8; margin-bottom: 0.5rem; text-transform: uppercase; }

        input[type="number"] {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 0.7rem;
            border-radius: 0.5rem;
            outline: none;
        }

        .visualizer-container {
            background: #0f172a;
            height: 60px;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        #progressLine {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 2px;
            background: var(--accent);
            display: none;
        }

        .button-stack { display: flex; flex-direction: column; gap: 0.75rem; }

        button {
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-preview { background: #334155; color: white; }
        .btn-preview:hover { background: #475569; }
        .btn-cut { background: var(--primary); color: white; }
        .btn-cut:hover { opacity: 0.9; }
        .btn-download { background: var(--secondary); color: white; display: none; text-decoration: none; }

        #status { text-align: center; margin-top: 1rem; font-size: 0.85rem; color: #94a3b8; }

        @media (max-width: 400px) {
            .app-container { padding: 1.2rem; }
            .controls { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>✂️ Audio Cutter Pro</h1>

    <label class="drop-zone" id="dropZone">
        <span id="fileName">Pilih file MP3 / WAV / WebM</span>
        <input type="file" id="audioInput" accept="audio/*, .webm" hidden>
    </label>

    <div class="visualizer-container" id="viz">
        <div id="progressLine"></div>
        <span id="vizText" style="color:#475569; font-size: 0.8rem;">Preview Visualizer</span>
    </div>

    <div class="controls">
        <div class="input-group">
            <label>Mulai (detik)</label>
            <input type="number" id="startTime" value="0" step="0.1">
        </div>
        <div class="input-group">
            <label>Durasi (detik)</label>
            <input type="number" id="duration" value="5" step="0.1">
        </div>
    </div>

        <div class="button-stack">
        <button class="btn-preview" onclick="togglePreview()" id="playBtn">▶️ Putar Preview</button>
        <div style="display: flex; gap: 8px;">
            <button class="btn-cut" onclick="processCut('webm')" style="flex:1">✂️ Potong (WebM)</button>
            <button class="btn-cut" onclick="processCut('mp3')" style="flex:1; background: #8b5cf6;">✂️ Potong (MP3)</button>
        </div>
        <a id="downloadLink" class="btn-download">💾 Download Hasil</a>
    </div>


    <div id="status">Siap digunakan</div>
</div>

<script>
    let context = new (window.AudioContext || window.webkitAudioContext)();
    let audioBuffer = null;
    let sourceNode = null;
    let isPlaying = false;

    const audioInput = document.getElementById('audioInput');
    const status = document.getElementById('status');
    const playBtn = document.getElementById('playBtn');
    const progressLine = document.getElementById('progressLine');

    audioInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('fileName').innerText = file.name;
        status.innerText = "Mendekode audio... mohon tunggu";
        const arrayBuffer = await file.arrayBuffer();
        audioBuffer = await context.decodeAudioData(arrayBuffer);
        document.getElementById('vizText').style.display = 'none';
        status.innerText = `Siap! Durasi: ${audioBuffer.duration.toFixed(2)} detik`;
    });

    function togglePreview() {
        if (!audioBuffer) return alert("Pilih file dulu!");
        if (isPlaying) {
            stopPreview();
        } else {
            const start = parseFloat(document.getElementById('startTime').value);
            const dur = parseFloat(document.getElementById('duration').value);
            if (start + dur > audioBuffer.duration) return alert("Durasi melebihi batas file!");
            sourceNode = context.createBufferSource();
            sourceNode.buffer = audioBuffer;
            sourceNode.connect(context.destination);
            sourceNode.start(0, start, dur);
            isPlaying = true;
            playBtn.innerText = "⏹️ Hentikan";
            progressLine.style.display = 'block';
            progressLine.style.transition = `none`;
            progressLine.style.left = '0%';
            setTimeout(() => {
                progressLine.style.transition = `left ${dur}s linear`;
                progressLine.style.left = '100%';
            }, 50);
            sourceNode.onended = () => stopPreview();
        }
    }

    function stopPreview() {
        if (sourceNode) { sourceNode.stop(); sourceNode = null; }
        isPlaying = false;
        playBtn.innerText = "▶️ Putar Preview";
        progressLine.style.display = 'none';
    }

               async function processCut(type = 'webm') {
        if (!audioBuffer) return alert("Pilih file audio terlebih dahulu!");
        stopPreview();

        const start = parseFloat(document.getElementById('startTime').value);
        const dur = parseFloat(document.getElementById('duration').value);
        const sampleRate = audioBuffer.sampleRate;
        
        if (start + dur > audioBuffer.duration) {
            return alert("Durasi potongan melebihi panjang lagu!");
        }

        status.innerText = `Memproses ke ${type.toUpperCase()}... mohon tunggu`;

        // DEKLARASI ASLI ANDA (Tetap dipertahankan)
        const frameCount = Math.floor(dur * sampleRate);
        const newBuffer = context.createBuffer(audioBuffer.numberOfChannels, frameCount, sampleRate);

        for (let i = 0; i < audioBuffer.numberOfChannels; i++) {
            const data = audioBuffer.getChannelData(i);
            const newData = newBuffer.getChannelData(i);
            const offset = Math.floor(start * sampleRate);
            for (let j = 0; j < frameCount; j++) {
                newData[j] = data[j + offset] || 0;
            }
        }

        if (type === 'webm') {
            // --- LOGIKA WEBM (Metode Recorder) ---
            const dest = context.createMediaStreamDestination();
            const bufferSource = context.createBufferSource();
            bufferSource.buffer = newBuffer;
            bufferSource.connect(dest);

            const recorder = new MediaRecorder(dest.stream, { mimeType: 'audio/webm' });
            const chunks = [];

            recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
            recorder.onstop = () => {
                const webmBlob = new Blob(chunks, { type: 'audio/webm' });
                showDownloadLink(webmBlob, 'webm');
            };

            recorder.start();
            bufferSource.start();
            
            setTimeout(() => {
                recorder.stop();
                bufferSource.stop();
            }, (dur * 1000) + 200);

        } else if (type === 'mp3') {
            // --- LOGIKA MP3 (Menggunakan lamejs Lokal) ---
            try {
                // Inisialisasi Encoder
                const channels = newBuffer.numberOfChannels;
                const mp3encoder = new lamejs.Mp3Encoder(channels, sampleRate, 128);
                const mp3Data = [];

                // Ambil data channel
                const left = newBuffer.getChannelData(0);
                const right = channels > 1 ? newBuffer.getChannelData(1) : left;

                // Konversi Float32 ke Int16 (WAJIB agar tidak loading terus)
                const toInt16 = (f32) => {
                    let i = f32.length, res = new Int16Array(i);
                    while (i--) {
                        let s = Math.max(-1, Math.min(1, f32[i]));
                        res[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    }
                    return res;
                };

                const lInt = toInt16(left);
                const rInt = toInt16(right);
                
                // Proses per blok 1152 sampel
                const blockSize = 1152;
                for (let i = 0; i < lInt.length; i += blockSize) {
                    const lChunk = lInt.subarray(i, i + blockSize);
                    const rChunk = rInt.subarray(i, i + blockSize);
                    const mp3buf = mp3encoder.encodeBuffer(lChunk, rChunk);
                    if (mp3buf.length > 0) {
                        mp3Data.push(new Int8Array(mp3buf));
                    }
                }

                // Flush sisa buffer
                const last = mp3encoder.flush();
                if (last.length > 0) {
                    mp3Data.push(new Int8Array(last));
                }

                const mp3Blob = new Blob(mp3Data, { type: 'audio/mp3' });
                showDownloadLink(mp3Blob, 'mp3');

            } catch (err) {
                console.error("Error Encoding MP3:", err);
                status.innerText = "Error: Pastikan file lame.min.js sudah terload.";
            }
        }
    }

    function showDownloadLink(blob, ext) {
        const url = URL.createObjectURL(blob);
        const dl = document.getElementById('downloadLink');
        dl.href = url;
        dl.download = `cut_audio_${Date.now()}.${ext}`;
        dl.style.display = "flex";
        dl.innerText = `💾 Download Hasil (.${ext})`;
        status.innerText = `Selesai! Format ${ext.toUpperCase()} siap.`;
    }

</script>

</body>
</html>
