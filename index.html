<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SambungAudio: Aplikasi sambung audio</title>
    
    <script src="lame.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #10b981;
            --accent: #f43f5e;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }
        * {box-sizing: border-box;}
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0 15px;
            display: flex;
            flex-direction: column;
            align-content: center;
            min-height: 100vh;
        }
        .app-container {
            background: var(--card);
            max-width: 600px;
            padding: 1rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }
        .audio-card {
            background: #334155;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            border-left: 5px solid #3498db;
        }
        canvas {
            background: #0f172a;
            width: 100%;
            height: 60px;
            border-radius: 0.5rem;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        .controls2 {
            display: flex;
            gap: 10px;
        }
        button {
            width: 100%;
            padding: 20px 10px;
            border: none;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn-preview { background: #3498db; color: white; }
        .btn-preview:hover { background: #4498db; }
        .btn-proses { background: var(--primary); color: white; }
        .btn-proses:hover { opacity: 0.9; }
        button:disabled { background: #555; cursor: not-allowed; opacity: 0.6; }
        
        input[type="file"] {
            width: 80%;
            color: white;
            outline: none;
            border: 2px dashed #475569;
            border-radius: 1rem;
            padding: 10px;
            text-align: center;
        }
        @media screen and (min-width: 769px) {
            body {width: 100%; align-items: center}
            .app-container { padding: 1.2rem; }
        }
        
    </style>
</head>
<body>
<div class="app-container">
    <p>*) File tidak dikirim ke server. Semua proses terjadi di browser Anda.</p>
    <canvas id="visualizer"></canvas>
    <!-- Tambahkan ID pada tombol agar bisa dimanipulasi -->
    <button id="btnAdd" style="margin-bottom: 20px">🎛 Tambah Audio</button>
    
    <div id="audioInputs">
        <div class="audio-card">
            <label>Audio 1:</label>
            <input type="file" id="file1" class="audio-file" accept="audio/*,.mp3,.wav,.webm">
        </div>
        
    </div>

    <div class="controls">
        <button class="btn-preview" onclick="togglePreview()" id="playBtn">▶️ Putar Preview</button>
        <div class="controls2">
            <!-- Tombol WebM dan MP3 dibedakan id-nya -->
            <button class="btn-proses" id="btnWebM" style="flex:1;">Proses ke (WebM)</button>
            <button class="btn-proses" id="btnMP3" style="flex:1; background: #8b5cf6;">Proses ke (MP3)</button>
        </div>
        <button id="btnDownload" disabled>💾 Download Hasil</button>
    </div>
    <p id="status" style="text-align: center; color: #aaa; margin-top: 10px;"></p>
</div>
<script>
// Pastikan library lamejs sudah dipanggil di HTML (misal via CDN)
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let currentSource = null;
let isPlaying = false;
let resultBlob = null;
const canvas = document.getElementById('visualizer');
const ctx = canvas.getContext('2d');

// 1. Fungsi Tambah Audio (Maksimal 5)
document.getElementById('btnAdd').onclick = function() {
    const container = document.getElementById('audioInputs');
    const count = container.getElementsByClassName('audio-card').length;
    if (count < 5) {
        const div = document.createElement('div');
        div.className = 'audio-card';
        div.style.borderLeft = "5px solid " + ['#f1c40f', '#9b59b6', '#1abc9c', '#e74c3c'][count-1];
        div.innerHTML = `<label>Audio ${count + 1}:</label> <input type="file" class="audio-file" accept="audio/*,.mp3,.wav,.webm">`;
        container.appendChild(div);
    } else {
        alert("Maksimal 5 audio");
    }
};

// 2. Fungsi Menggabungkan Audio (Output AudioBuffer)
async function mergeAudio() {
    const inputs = document.querySelectorAll('.audio-file');
    let buffers = [];
    for (let input of inputs) {
        if (input.files[0]) {
            const arrayBuf = await input.files[0].arrayBuffer();
            const decoded = await audioCtx.decodeAudioData(arrayBuf);
            buffers.push(decoded);
        }
    }
    if (buffers.length === 0) return null;

    let totalLen = buffers.reduce((acc, b) => acc + b.length, 0);
    // Buat buffer stereo (2 channel)
    let out = audioCtx.createBuffer(2, totalLen, buffers[0].sampleRate);
    
    for (let i = 0; i < out.numberOfChannels; i++) {
        let offset = 0;
        for (let b of buffers) {
            // Jika audio input mono tapi output stereo, salin ke kedua channel
            let channelData = (b.numberOfChannels > i) ? b.getChannelData(i) : b.getChannelData(0);
            out.getChannelData(i).set(channelData, offset);
            offset += b.length;
        }
    }
    return out;
}

// 3. Fungsi Visualizer & Preview
function startVisualizer(source) {
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    const dataArray = new Uint8Array(analyser.frequencyBinCount);
    function draw() {
        if (!isPlaying) return ctx.clearRect(0, 0, canvas.width, canvas.height);
        requestAnimationFrame(draw);
        analyser.getByteFrequencyData(dataArray);
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        let x = 0;
        for(let i = 0; i < dataArray.length; i++) {
            let barHeight = dataArray[i]/2;
            ctx.fillStyle = `rgb(79, 70, 229)`;
            ctx.fillRect(x, canvas.height - barHeight, (canvas.width/dataArray.length)*2.5, barHeight);
            x += (canvas.width/dataArray.length)*2.5 + 1;
        }
    }
    draw();
}

document.getElementById('playBtn').onclick = async function() {
    if (isPlaying) {
        currentSource.stop();
        isPlaying = false;
        this.innerText = "▶️ Putar Preview";
        return;
    }
    const merged = await mergeAudio();
    if (!merged) return alert("Pilih file audio dulu!");
    currentSource = audioCtx.createBufferSource();
    currentSource.buffer = merged;
    isPlaying = true;
    this.innerText = "⏹️ Berhenti";
    startVisualizer(currentSource);
    currentSource.start();
    currentSource.onended = () => {
        isPlaying = false;
        this.innerText = "▶️ Putar Preview";
    };
};

// 4. Proses ke MP3 (Stereo Fix)
document.getElementById('btnMP3').onclick = async function() {
    const merged = await mergeAudio();
    if (!merged) return alert("Pilih audio dulu!");
    
    document.getElementById('status').innerText = "Memproses MP3 (Stereo)...";
    
    // Inisialisasi Encoder: 2 Channel (Stereo), SampleRate, Bitrate 128kbps
    const mp3encoder = new lamejs.Mp3Encoder(2, merged.sampleRate, 128);
    
    // Ambil data channel kiri dan kanan
    const left = merged.getChannelData(0);
    const right = merged.getChannelData(1);
    
    // Konversi Float32 ke Int16
    const convertFloatToInt16 = (buffer) => {
        let l = buffer.length;
        let buf = new Int16Array(l);
        while (l--) {
            let s = Math.max(-1, Math.min(1, buffer[l]));
            buf[l] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
        return buf;
    };

    const leftInt16 = convertFloatToInt16(left);
    const rightInt16 = convertFloatToInt16(right);
    
    const mp3Data = [];
    const sampleBlockSize = 1152; // Standar frame MP3
    
    for (let i = 0; i < leftInt16.length; i += sampleBlockSize) {
        let leftChunk = leftInt16.subarray(i, i + sampleBlockSize);
        let rightChunk = rightInt16.subarray(i, i + sampleBlockSize);
        // Encode menggunakan buffer kiri dan kanan terpisah untuk Stereo
        let mp3buf = mp3encoder.encodeBuffer(leftChunk, rightChunk);
        if (mp3buf.length > 0) mp3Data.push(new Uint8Array(mp3buf));
    }
    
    const endBuf = mp3encoder.flush();
    if (endBuf.length > 0) mp3Data.push(new Uint8Array(endBuf));
    
    resultBlob = new Blob(mp3Data, {type: 'audio/mp3'});
    enableDownload("Hasil-Audio.mp3");
};

function enableDownload(name) {
    document.getElementById('status').innerText = "Proses Selesai!";
    const btn = document.getElementById('btnDownload');
    btn.disabled = false;
    btn.onclick = () => {
        const url = URL.createObjectURL(resultBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = name;
        a.click();
    };
}
</script>
</body>
</html>
