<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Reader & Signer - GitHub Fixed</title>
    
    <!-- Memanggil file lokal -->
    <script src="pdf.min.js"></script>
    
    <!-- Library pendukung tetap menggunakan CDN -->
    <script src="https://cloudflare.com"></script>
    <script src="https://jsdelivr.net"></script>

    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #e2e8f0; padding: 15px; }
        .toolbar { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; width: 100%; max-width: 800px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        #pdf-viewport { position: relative; border: 2px solid #94a3b8; background: white; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); overflow: auto; }
        canvas { display: block; max-width: 100%; }
        #sig-canvas { position: absolute; top: 0; left: 0; z-index: 10; cursor: crosshair; }
        button { padding: 10px 18px; border: none; border-radius: 8px; background: #2563eb; color: white; cursor: pointer; font-weight: 600; }
        .btn-danger { background: #ef4444; }
        .status-bar { font-size: 13px; color: #475569; margin-top: 5px; width: 100%; text-align: center; }
    </style>
</head>
<body>

<div class="toolbar">
    <input type="file" id="upload" accept="application/pdf">
    <button id="prev">◀ Prev</button>
    <span style="align-self:center">Hal: <span id="num">0</span> / <span id="total">0</span></span>
    <button id="next">Next ▶</button>
    <button class="btn-danger" id="clear">Hapus Coretan</button>
    <button style="background: #10b981" id="save">Simpan PDF</button>
    <div id="status" class="status-bar">Status: Menunggu file...</div>
</div>

<div id="pdf-viewport">
    <canvas id="pdf-canvas"></canvas>
    <canvas id="sig-canvas"></canvas>
</div>

<script>
    // FIX 1: Deteksi Library PDF.js di GitHub Pages
    const pdfjs = window['pdfjs-dist/build/pdf'];
    // Pastikan path worker benar (relatif terhadap index.html)
    pdfjs.GlobalWorkerOptions.workerSrc = 'pdf.worker.min.js';

    let pdfDoc = null, curPage = 1, signature = null;
    const canvas = document.getElementById('pdf-canvas');
    const sCanvas = document.getElementById('sig-canvas');
    const ctx = canvas.getContext('2d');

    // Inisialisasi Tanda Tangan
    function initSig() {
        if (signature) signature.off();
        signature = new SignaturePad(sCanvas, { penColor: 'black' });
    }

    // Render Halaman
    async function showPage(n) {
        try {
            const page = await pdfDoc.getPage(n);
            const vp = page.getViewport({ scale: 1.5 });
            
            canvas.height = vp.height; canvas.width = vp.width;
            sCanvas.height = vp.height; sCanvas.width = vp.width;

            await page.render({ canvasContext: ctx, viewport: vp }).promise;
            document.getElementById('num').textContent = n;
            initSig();
            document.getElementById('status').innerText = "Status: Siap ditandatangani";
        } catch (e) {
            document.getElementById('status').innerText = "Render Error: " + e.message;
        }
    }

    // Handler Upload
    document.getElementById('upload').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async function() {
            try {
                // FIX 2: Gunakan Uint8Array untuk kompatibilitas tinggi
                const data = new Uint8Array(this.result);
                pdfDoc = await pdfjs.getDocument({data: data}).promise;
                document.getElementById('total').textContent = pdfDoc.numPages;
                showPage(curPage);
            } catch (err) {
                document.getElementById('status').innerText = "Gagal memuat PDF: Versi Worker tidak cocok?";
            }
        };
        reader.readAsArrayBuffer(file);
    };

    // Navigasi & Simpan
    document.getElementById('prev').onclick = () => { if(pdfDoc && curPage > 1) showPage(--curPage); };
    document.getElementById('next').onclick = () => { if(pdfDoc && curPage < pdfDoc.numPages) showPage(++curPage); };
    document.getElementById('clear').onclick = () => signature.clear();

    document.getElementById('save').onclick = () => {
        if(!pdfDoc) return;
        const { jsPDF } = window.jspdf;
        const out = new jsPDF({ 
            orientation: canvas.width > canvas.height ? 'l' : 'p', 
            unit: 'px', 
            format: [canvas.width, canvas.height] 
        });
        out.addImage(canvas.toDataURL('image/jpeg'), 'JPEG', 0, 0, canvas.width, canvas.height);
        if(!signature.isEmpty()) out.addImage(signature.toDataURL(), 'PNG', 0, 0, canvas.width, canvas.height);
        out.save('signed_document.pdf');
    };
</script>
</body>
</html>
