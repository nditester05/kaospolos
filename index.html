<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Mini Mobile Legend Style</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #222; }
        canvas { display: block; background: #3a5a3a; } /* Warna rumput */
        
        /* Overlay Pesan Orientasi */
        #orientation-msg {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white; text-align: center;
            padding-top: 20%; font-family: sans-serif; z-index: 100;
        }
        @media (orientation: portrait) { #orientation-msg { display: block; } }
    </style>
</head>
<body>

<div id="orientation-msg">Mohon putar HP Anda ke mode Landscape (Miring)</div>
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Pengaturan Ukuran (Landscape)
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Data Pemain
    const player = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        size: 20,
        color: '#3498db',
        speed: 4,
        dx: 0,
        dy: 0,
        health: 100
    };

    // Joystick Virtual
    const joystick = {
        active: false,
        originX: 100,
        originY: 0, // Akan diatur di bawah
        currX: 100,
        currY: 0,
        radius: 60,
        knobRadius: 25
    };

    // Tombol Skill/Serang
    const attackBtn = { x: 0, y: 0, radius: 40, active: false };

    // Inisialisasi Posisi Kontrol
    function initControls() {
        joystick.originY = canvas.height - 100;
        joystick.currY = joystick.originY;
        attackBtn.x = canvas.width - 80;
        attackBtn.y = canvas.height - 80;
    }
    initControls();

    // Input Touch
    canvas.addEventListener('touchstart', (e) => {
        for (let t of e.touches) {
            // Cek sisi kiri untuk Joystick
            if (t.clientX < canvas.width / 2) {
                joystick.active = true;
                joystick.currX = t.clientX;
                joystick.currY = t.clientY;
            }
            // Cek sisi kanan untuk Tombol Serang
            let dist = Math.hypot(t.clientX - attackBtn.x, t.clientY - attackBtn.y);
            if (dist < attackBtn.radius) {
                attackBtn.active = true;
                player.color = '#e74c3c'; // Berubah warna saat "menyerang"
                setTimeout(() => player.color = '#3498db', 200);
            }
        }
    });

    canvas.addEventListener('touchmove', (e) => {
        if (!joystick.active) return;
        e.preventDefault();
        for (let t of e.touches) {
            if (t.clientX < canvas.width / 2) {
                let dx = t.clientX - joystick.originX;
                let dy = t.clientY - joystick.originY;
                let dist = Math.hypot(dx, dy);
                
                // Batasi knob agar tetap di dalam lingkaran joystick
                if (dist > joystick.radius) {
                    let angle = Math.atan2(dy, dx);
                    joystick.currX = joystick.originX + Math.cos(angle) * joystick.radius;
                    joystick.currY = joystick.originY + Math.sin(angle) * joystick.radius;
                } else {
                    joystick.currX = t.clientX;
                    joystick.currY = t.clientY;
                }

                // Hitung arah gerak pemain
                player.dx = (joystick.currX - joystick.originX) / joystick.radius;
                player.dy = (joystick.currY - joystick.originY) / joystick.radius;
            }
        }
    }, { passive: false });

    canvas.addEventListener('touchend', () => {
        joystick.active = false;
        joystick.currX = joystick.originX;
        joystick.currY = joystick.originY;
        player.dx = 0;
        player.dy = 0;
        attackBtn.active = false;
    });

    // Loop Game
    function update() {
        player.x += player.dx * player.speed;
        player.y += player.dy * player.speed;

        // Batasi layar
        player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
        player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Gambar Pemain
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
        ctx.fillStyle = player.color;
        ctx.fill();
        ctx.closePath();

        // Gambar UI Joystick
        ctx.beginPath();
        ctx.arc(joystick.originX, joystick.originY, joystick.radius, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 4;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(joystick.currX, joystick.currY, joystick.knobRadius, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fill();

        // Gambar Tombol Serang
        ctx.beginPath();
        ctx.arc(attackBtn.x, attackBtn.y, attackBtn.radius, 0, Math.PI * 2);
        ctx.fillStyle = attackBtn.active ? '#c0392b' : 'rgba(231, 76, 60, 0.6)';
        ctx.fill();
        ctx.fillStyle = 'white';
        ctx.font = '20px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('HIT', attackBtn.x, attackBtn.y + 7);

        requestAnimationFrame(() => {
            update();
            draw();
        });
    }

    draw();
</script>

</body>
</html>
