<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Trimmer Pro</title>

    <!-- 1. WAJIB: Keamanan untuk GitHub Pages -->
    <script src="coi-serviceworker.min.js"></script>

    <!-- 2. WAJIB: Library FFmpeg -->
    <script src="https://unpkg.com"></script>

    <style>
        :root { --p: #007bff; }
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        video { width: 100%; border-radius: 8px; background: #000; margin: 15px 0; }
        .range-box { background: #eee; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        input[type="range"] { width: 100%; }
        button { width: 100%; padding: 15px; background: var(--p); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; }
        #status { font-size: 12px; color: #666; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h3>Potong Video</h3>
    <input type="file" id="uploader" accept="video/*">
    
    <video id="player" controls playsinline muted></video>

    <div class="range-box">
        <div style="display:flex; justify-content: space-between; font-size: 14px;">
            <span>Mulai: <b id="startVal">0</b>s</span>
            <span>Akhir: <b id="endVal">0</b>s</span>
        </div>
        <input type="range" id="startRange" min="0" value="0" step="0.1">
        <input type="range" id="endRange" min="0" value="0" step="0.1">
    </div>

    <button id="trimBtn">Potong & Simpan</button>
    <p id="status">Pilih video untuk memulai.</p>
</div>

<script>
    // PASTIKAN HANYA ADA SATU DEKLARASI DI SINI
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpegInstance = createFFmpeg({ log: true }); // Saya ganti namanya agar tidak bentrok

    const uploader = document.getElementById('uploader');
    const player = document.getElementById('player');
    const startRange = document.getElementById('startRange');
    const endRange = document.getElementById('endRange');
    const trimBtn = document.getElementById('trimBtn');
    const status = document.getElementById('status');

    uploader.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        player.src = URL.createObjectURL(file);
        player.onloadedmetadata = () => {
            const dur = player.duration.toFixed(1);
            startRange.max = dur;
            endRange.max = dur;
            endRange.value = dur;
            document.getElementById('endVal').innerText = dur;
            status.innerText = "Video siap dipotong.";
        };
    };

    startRange.oninput = () => {
        if (parseFloat(startRange.value) >= parseFloat(endRange.value)) {
            startRange.value = parseFloat(endRange.value) - 0.1;
        }
        document.getElementById('startVal').innerText = startRange.value;
        player.currentTime = startRange.value;
    };

    endRange.oninput = () => {
        if (parseFloat(endRange.value) <= parseFloat(startRange.value)) {
            endRange.value = parseFloat(startRange.value) + 0.1;
        }
        document.getElementById('endVal').innerText = endRange.value;
        player.currentTime = endRange.value;
    };

    trimBtn.onclick = async () => {
        const file = uploader.files[0];
        if (!file) return;

        trimBtn.disabled = true;
        status.innerText = "Memuat engine (Sabar ya)...";

        try {
            if (!ffmpegInstance.isLoaded()) await ffmpegInstance.load();

            status.innerText = "Sedang memproses... Tunggu sampai selesai.";
            
            const start = startRange.value;
            const duration = (parseFloat(endRange.value) - parseFloat(start)).toFixed(1);

            ffmpegInstance.FS('writeFile', 'input.mp4', await fetchFile(file));

            // Gunakan perintah copy agar cepat
            await ffmpegInstance.run('-ss', start.toString(), '-i', 'input.mp4', '-t', duration.toString(), '-c', 'copy', 'output.mp4');

            const data = ffmpegInstance.FS('readFile', 'output.mp4');
            const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'video_potong.mp4';
            a.click();

            status.innerText = "Selesai! Video diunduh.";
        } catch (err) {
            console.error(err);
            status.innerText = "Error: " + err.message;
        } finally {
            trimBtn.disabled = false;
        }
    };
</script>

</body>
</html>
