<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Signer App - Single File</title>
    
    <!-- Library Dependencies -->
    
    <script src="pdf.min.js"></script>

    <style>
        :root { --primary: #2563eb; --danger: #dc2626; --bg: #f8fafc; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 10px; background: var(--bg);
            display: flex; flex-direction: column; align-items: center;
        }
        .toolbar {
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            margin-bottom: 20px; width: 100%; max-width: 800px;
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
        }
        #pdf-wrapper { 
            position: relative; border: 1px solid #cbd5e1; 
            background: white; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            overflow: hidden; touch-action: none;
        }
        canvas { max-width: 100%; height: auto !important; }
        #signature-layer { position: absolute; top: 0; left: 0; z-index: 10; cursor: crosshair; }
        
        button, input[type="file"]::file-selector-button {
            padding: 8px 16px; border-radius: 6px; border: none;
            background: var(--primary); color: white; cursor: pointer; font-weight: 500;
        }
        .btn-danger { background: var(--danger); }
        .page-info { align-self: center; font-size: 14px; font-weight: bold; }
        
        /* Mobile adjustment */
        @media (max-width: 600px) {
            .toolbar { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>

<div class="toolbar">
    <input type="file" id="file-input" accept="application/pdf">
    <button id="prev-page">◀ Prev</button>
    <span class="page-info"><span id="page-num">0</span> / <span id="page-count">0</span></span>
    <button id="next-page">Next ▶</button>
    <button class="btn-danger" id="clear-sig">Hapus Tanda Tangan</button>
    <button style="background: #059669;" id="save-pdf">Simpan & Download</button>
</div>

<div id="pdf-wrapper">
    <!-- Canvas untuk menampilkan PDF -->
    <canvas id="pdf-render"></canvas>
    <!-- Canvas transparan di atasnya untuk tanda tangan -->
    <canvas id="signature-layer"></canvas>
</div>

<script>
    const { jsPDF } = window.jspdf;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cloudflare.com';

    let pdfDoc = null,
        pageNum = 1,
        pdfCanvas = document.getElementById('pdf-render'),
        sigCanvas = document.getElementById('signature-layer'),
        ctx = pdfCanvas.getContext('2d'),
        signaturePad = null;

    // Inisialisasi Signature Pad
    function initSignature() {
        if (signaturePad) signaturePad.off(); 
        signaturePad = new SignaturePad(sigCanvas, {
            backgroundColor: 'rgba(0,0,0,0)',
            penColor: 'black'
        });
    }

    // Tampilkan Halaman PDF
    function renderPage(num) {
        pdfDoc.getPage(num).then(page => {
            // Sesuaikan resolusi untuk layar jernih (desktop & mobile)
            const viewport = page.getViewport({ scale: 1.5 });
            pdfCanvas.height = viewport.height;
            pdfCanvas.width = viewport.width;
            
            // Samakan ukuran canvas tanda tangan dengan canvas PDF
            sigCanvas.height = viewport.height;
            sigCanvas.width = viewport.width;

            const renderContext = { canvasContext: ctx, viewport: viewport };
            page.render(renderContext).promise.then(() => {
                initSignature(); // Reset signature pad setiap ganti halaman
            });

            document.getElementById('page-num').textContent = num;
        });
    }

    // Handler Pilih File
    document.getElementById('file-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file || file.type !== 'application/pdf') return;

        const reader = new FileReader();
        reader.onload = function() {
            const typedarray = new Uint8Array(this.result);
            pdfjsLib.getDocument(typedarray).promise.then(pdf => {
                pdfDoc = pdf;
                pageNum = 1;
                document.getElementById('page-count').textContent = pdf.numPages;
                renderPage(pageNum);
            });
        };
        reader.readAsArrayBuffer(file);
    });

    // Navigasi
    document.getElementById('prev-page').addEventListener('click', () => {
        if (pdfDoc && pageNum > 1) { pageNum--; renderPage(pageNum); }
    });
    document.getElementById('next-page').addEventListener('click', () => {
        if (pdfDoc && pageNum < pdfDoc.numPages) { pageNum++; renderPage(pageNum); }
    });

    // Hapus Coretan
    document.getElementById('clear-sig').addEventListener('click', () => {
        if (signaturePad) signaturePad.clear();
    });

    // Proses Simpan
    document.getElementById('save-pdf').addEventListener('click', async () => {
        if (!pdfDoc) return alert("Pilih file PDF dulu!");

        const sigData = signaturePad.toDataURL('image/png');
        
        // Buat PDF baru dengan ukuran yang sama persis dengan tampilan sekarang
        const pdf = new jsPDF({
            orientation: pdfCanvas.width > pdfCanvas.height ? 'l' : 'p',
            unit: 'px',
            format: [pdfCanvas.width, pdfCanvas.height]
        });

        // Gambar 1: Halaman PDF asli (diambil dari canvas)
        const pdfImg = pdfCanvas.toDataURL('image/jpeg', 1.0);
        pdf.addImage(pdfImg, 'JPEG', 0, 0, pdfCanvas.width, pdfCanvas.height);

        // Gambar 2: Tanda tangan (di atasnya)
        if (!signaturePad.isEmpty()) {
            pdf.addImage(sigData, 'PNG', 0, 0, pdfCanvas.width, pdfCanvas.height);
        }

        pdf.save('hasil-tanda-tangan.pdf');
    });
</script>

</body>
</html>
