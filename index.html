<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Mixer Studio</title>
    
    <script src="lame.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #10b981;
            --accent: #f43f5e;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }
        * {box-sizing: border-box;}
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0 15px;
            display: flex;
            flex-direction: column;
            align-content: center;
            min-height: 100vh;
        }
        .app-container {
            background: var(--card);
            max-width: 600px;
            padding: 1rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }
        .track-card {
            background: #334155;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            border-left: 5px solid #3498db;
        }
        canvas {
            background: #0f172a;
            width: 100%;
            height: 60px;
            border-radius: 0.5rem;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        .controls2 {
            display: flex;
            gap: 10px;
        }
        button {
            width: 100%;
            padding: 20px 10px;
            border: none;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn-preview { background: #3498db; color: white; }
        .btn-preview:hover { background: #4498db; }
        .btn-proses { background: var(--primary); color: white; }
        .btn-proses:hover { opacity: 0.9; }
        button:disabled { background: #555; cursor: not-allowed; opacity: 0.6; }
        input[type="number"] {
            width: 30%;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 0.7rem;
            border-radius: 0.5rem;
            outline: none;
        }
        @media screen and (min-width: 769px) {
            body {width: 100%; align-items: center}
            .app-container { padding: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <canvas id="visualizer"></canvas>
    <button>Tambah track</button>
    <div class="track-card">
        <label>Track 1:</label>
        <input type="file" id="file1" accept="audio/*,.mp3,.wav,.webm">
        <br><br>
        <label>Delay:</label>
        <input type="number" id="delay1" value="0" min="0" step="0.1">
    </div>

    <div class="track-card" style="border-left-color: #e74c3c;">
        <label>Track 2:</label>
        <input type="file" id="file2" accept="audio/*,.mp3,.wav,.webm">
        <br><br>
        <label>Delay:</label>
        <input type="number" id="delay2" value="0" min="0" step="0.1">
    </div>

    <div class="controls">
        <button class="btn-preview" onclick="togglePreview()" id="playBtn">▶️ Putar Preview</button>
        <div class="controls2">
            <button class="btn-proses" id="btnProcess" style="flex:1; ">Proses ke (WebM)</button>
            <button class="btn-proses" id="btnProcess" style="flex:1; background: #8b5cf6;">Proses ke (MP3)</button>
        </div>
        <button id="btnDownload" disabled>💾 Download Hasil</button>
    </div>
    <p id="status" style="text-align: center; color: #aaa; margin-top: 10px;"></p>
</div>

<script>
    let audioCtx, analyser, recorder, chunks;
    let trackCount = 2;
    const maxTracks = 5;

    document.querySelector('button:not([class])').onclick = () => {
        if (trackCount >= maxTracks) return alert("Maksimal 5 track!");
        trackCount++;
        
        const container = document.querySelector('.app-container');
        const btnControls = document.querySelector('.controls');
        const newTrack = document.createElement('div');
        newTrack.className = 'track-card';
        newTrack.style.borderLeftColor = trackCount % 2 === 0 ? '#e74c3c' : '#3498db';
        newTrack.innerHTML = `
            <label>Track ${trackCount}:</label>
            <input type="file" id="file${trackCount}" accept="audio/*,.mp3,.wav,.webm">
            <br><br>
            <label>Delay:</label>
            <input type="number" id="delay${trackCount}" value="0" min="0" step="0.1">
        `;
        container.insertBefore(newTrack, btnControls);
    };
    
    async function togglePreview() {
        const playBtn = document.getElementById('playBtn');
        if (audioCtx && audioCtx.state === 'running') {
            await audioCtx.close();
            playBtn.innerText = "▶️ Putar Preview";
            return;
        }
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.connect(audioCtx.destination);
        setupVisualizer();

        for (let i = 1; i <= trackCount; i++) {
            const fileInput = document.getElementById(`file${i}`);
            if (fileInput.files[0]) {
                const buf = await fileInput.files[0].arrayBuffer();
                const audioBuf = await audioCtx.decodeAudioData(buf);
                const source = audioCtx.createBufferSource();
                const delay = parseFloat(document.getElementById(`delay${i}`).value) || 0;
                source.buffer = audioBuf;
                source.connect(analyser);
                source.start(audioCtx.currentTime + delay);
            }
        }
        playBtn.innerText = "⏹️ Berhenti";
    }
    
    const btnProcessWebM = document.querySelectorAll('.btn-proses')[0];
    btnProcessWebM.onclick = async () => {
        if (audioCtx) await audioCtx.close();
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const dest = audioCtx.createMediaStreamDestination();
        chunks = [];
        analyser = audioCtx.createAnalyser();
        setupVisualizer();

        recorder = new MediaRecorder(dest.stream, { mimeType: 'audio/webm' });
        recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
        recorder.onstop = () => setupDownload(new Blob(chunks, { type: 'audio/webm' }), 'nteste05_mixing.webm');

        let maxDur = 0;
        for (let i = 1; i <= trackCount; i++) {
            const f = document.getElementById(`file${i}`).files[0];
            if (f) {
                const buf = await f.arrayBuffer();
                const audioBuf = await audioCtx.decodeAudioData(buf);
                const source = audioCtx.createBufferSource();
                const delay = parseFloat(document.getElementById(`delay${i}`).value) || 0;
                source.buffer = audioBuf;
                source.connect(dest);
                source.connect(audioCtx.destination);
                source.connect(analyser);
                source.start(audioCtx.currentTime + delay);
                maxDur = Math.max(maxDur, delay + audioBuf.duration);
            }
        }
        status.innerText = "Merekam WebM...";
        recorder.start();
        setTimeout(() => recorder.stop(), maxDur * 1000 + 500);
    };
    
    const btnProcessMP3 = document.querySelectorAll('.btn-proses')[1];
    btnProcessMP3.onclick = async () => {
        if (typeof lamejs === 'undefined') {
            document.getElementById('status').innerText = "Gagal memuat Encoder MP3.";
            return;
        }

        try {
            document.getElementById('status').innerText = "Rendering MP3...";
            const tempCtx = new AudioContext();
            const tracks = [];
            let maxDuration = 0;

            for (let i = 1; i <= trackCount; i++) {
                const f = document.getElementById(`file${i}`).files[0];
                if (f) {
                    const buf = await f.arrayBuffer();
                    const audioBuf = await tempCtx.decodeAudioData(buf);
                    const d = parseFloat(document.getElementById(`delay${i}`).value) || 0;
                    tracks.push({ buffer: audioBuf, delay: d });
                    maxDuration = Math.max(maxDuration, audioBuf.duration + d);
                }
            }

            const offlineCtx = new OfflineAudioContext(2, 44100 * maxDuration, 44100);
            tracks.forEach(t => {
                const s = offlineCtx.createBufferSource();
                s.buffer = t.buffer;
                s.connect(offlineCtx.destination);
                s.start(t.delay);
            });

            const renderedBuffer = await offlineCtx.startRendering();
            const mp3encoder = new lamejs.Mp3Encoder(2, 44100, 128);
            const left = renderedBuffer.getChannelData(0);
            const right = renderedBuffer.getChannelData(1);
            
            const convert = f => { let s = Math.max(-1, Math.min(1, f)); return s < 0 ? s * 0x8000 : s * 0x7FFF; };
            const mp3Data = [];
            for (let i = 0; i < left.length; i += 1152) {
                const lChunk = new Int16Array(1152), rChunk = new Int16Array(1152);
                for(let j=0; j<1152 && (i+j)<left.length; j++) {
                    lChunk[j] = convert(left[i+j]);
                    rChunk[j] = convert(right[i+j]);
                }
                const mp3buf = mp3encoder.encodeBuffer(lChunk, rChunk);
                if (mp3buf.length > 0) mp3Data.push(mp3buf);
            }
            mp3Data.push(mp3encoder.flush());
            setupDownload(new Blob(mp3Data, { type: 'audio/mp3' }), 'nteste05_mixing.mp3');

        } catch (err) {
            console.error(err);
            alert("Terjadi kesalahan saat memproses MP3: " + err.message);
        }
    };

    function setupDownload(blob, filename) {
        const url = URL.createObjectURL(blob);
        const btnDownload = document.getElementById('btnDownload');
        btnDownload.disabled = false;
        btnDownload.onclick = () => {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
        };
        document.getElementById('status').innerText = "Selesai!";
    }

    function setupVisualizer() {
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        function draw() {
            requestAnimationFrame(draw);
            analyser.getByteFrequencyData(dataArray);
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            let x = 0;
            for(let i = 0; i < dataArray.length; i++) {
                let barHeight = dataArray[i]/2;
                ctx.fillStyle = `rgb(50, 150, ${barHeight + 100})`;
                ctx.fillRect(x, canvas.height - barHeight, (canvas.width/dataArray.length)*2.5, barHeight);
                x += (canvas.width/dataArray.length)*2.5 + 1;
            }
        }
        draw();
    }
</script>

</body>
</html>
